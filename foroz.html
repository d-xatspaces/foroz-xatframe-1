<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foroz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chokokutai&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1a38 0%, #0f2550 35%, #163566 65%, #1b3f75 100%);
        }

        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sun rays ────────────────────────────── */
        .rays {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .rays::before {
            content: "";
            position: absolute;
            top: 10%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                rgba(120, 190, 255, 0.06) 0deg 4deg,
                transparent 4deg 20deg
            );
            animation: raysRotate 90s linear infinite;
        }

        .rays::after {
            content: "";
            position: absolute;
            top: 10%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(
                rgba(180, 220, 255, 0.04) 0deg 3deg,
                transparent 3deg 15deg
            );
            animation: raysRotate 120s linear infinite reverse;
        }

        @keyframes raysRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ── Sun ────────────────────────────────── */
        .sun {
            position: absolute;
            top: 4%;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            z-index: 2;
            pointer-events: none;
            filter: drop-shadow(0 0 30px rgba(140, 200, 255, 0.4))
                    drop-shadow(0 0 60px rgba(100, 180, 255, 0.2));
        }

        .sun svg {
            width: 100%;
            height: 100%;
            animation: sunPulse 5s ease-in-out infinite;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50%      { transform: scale(1.08); filter: brightness(1.15); }
        }

        /* ── Ambient glow spots ─────────────────── */
        .glow-spot {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: glowPulse 7s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.25; transform: scale(1); }
            50%      { opacity: 0.45; transform: scale(1.12); }
        }

        /* ── Mario-style clouds ─────────────────── */
        .cloud {
            position: absolute;
            pointer-events: none;
            animation: cloudDrift linear infinite;
        }

        .cloud-body {
            position: relative;
            display: inline-block;
        }

        .cloud-body svg {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 3px 0 rgba(80, 140, 220, 0.5))
                    drop-shadow(0 6px 16px rgba(0, 30, 100, 0.25));
        }

        .cloud-base {
            fill: #fff;
        }

        .cloud-shade {
            fill: #d0e4ff;
        }

        .cloud-highlight {
            fill: #f0f8ff;
        }

        .cloud-outline {
            fill: none;
            stroke: rgba(80, 130, 200, 0.6);
            stroke-width: 2.5;
            stroke-linejoin: round;
        }

        .cloud-eye {
            fill: #1a3a6a;
        }

        .cloud-eye-shine {
            fill: #fff;
        }

        /* Size variants */
        .cloud.sm .cloud-body { width: 90px; height: 62px; }
        .cloud.md .cloud-body { width: 140px; height: 95px; }
        .cloud.lg .cloud-body { width: 195px; height: 130px; }

        @keyframes cloudDrift {
            0%   { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }

        /* ── Mario hills (parallax) ─────────── */
        .hills {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .hill-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        .hill-layer svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .hill-back {
            height: 450px;
        }

        .hill-mid {
            height: 380px;
        }

        .hill-front {
            height: 280px;
        }

        @keyframes hillScroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ── Logo ───────────────────────────────── */
        .logo-area {
            position: absolute;
            left: 8%;
            top: 50%;
            transform: translateY(-50%) perspective(800px) rotateY(10deg);
            transform-origin: right center;
            z-index: 5;
            animation: logoFloat 5.5s ease-in-out infinite;
        }

        .logo-text {
            font-family: 'Chokokutai', cursive;
            font-size: clamp(4rem, 8vw, 7.5rem);
            font-weight: 800;
            color: #fff;
            letter-spacing: 5px;
            line-height: 1;
            text-shadow:
                0  1px 0 #dce8ff,
                0  2px 0 #c8dfff,
                0  3px 0 #b4d4ff,
                0  4px 0 #a0c8ff,
                0  5px 0 #8cbbfa,
                0  6px 0 #78aef5,
                0  7px 0 #64a1f0,
                0  8px 0 #5094eb,
                0  9px 0 #3d88e6,
                0 10px 0 #2a7ce0,
                0 12px 14px rgba(10, 50, 150, 0.45),
                0 16px 30px rgba(20, 80, 200, 0.3),
                0  0  60px rgba(90, 165, 255, 0.18);
            user-select: text;
        }

        .logo-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(170, 210, 255, 0.45);
            letter-spacing: 4px;
            margin-top: 10px;
            margin-left: 6px;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(-50%) perspective(800px) rotateY(10deg); }
            50%      { transform: translateY(calc(-50% - 10px)) perspective(800px) rotateY(10deg); }
        }

        /* ── Rules panel ────────────────────────── */
        .rules-panel {
            position: absolute;
            top: 50%;
            right: clamp(24px, 4vw, 64px);
            transform: translateY(-50%) perspective(800px) rotateY(-10deg);
            transform-origin: left center;
            width: clamp(270px, 22vw, 370px);
            z-index: 10;
            perspective: 900px;
        }

        .rules-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 0 0 24px;
            box-shadow:
                0 24px 64px rgba(0, 0, 0, 0.18),
                0  4px 12px rgba(0, 0, 0, 0.08),
                0  0  40px rgba(60, 140, 255, 0.08);
            transform-style: preserve-3d;
            animation: cardTilt 7s ease-in-out infinite;
            overflow: hidden;
        }

        @keyframes cardTilt {
            0%, 100% { transform: rotateX(2deg) rotateY(-3deg); }
            50%      { transform: rotateX(-1deg) rotateY(2deg) translateY(-6px); }
        }

        .rules-header {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            padding: 14px 26px;
            margin: 0 0 18px;
            background: linear-gradient(135deg, #2563eb, #6d3aed);
            border-bottom: 1px solid rgba(100, 180, 255, 0.25);
        }

        .rule-viewport {
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .rule-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: opacity 0.38s ease, transform 0.38s ease;
        }

        .rule-content.out {
            opacity: 0;
            transform: translateY(-18px) perspective(400px) rotateX(20deg);
        }

        .rule-content.in {
            opacity: 1;
            transform: translateY(0) perspective(400px) rotateX(0deg);
        }

        .rule-num {
            font-family: 'Lilita One', cursive;
            font-size: 2.8rem;
            font-weight: 700;
            color: rgba(37, 99, 235, 0.25);
            line-height: 1;
        }

        .rule-txt {
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            line-height: 1.55;
        }

        /* dots */
        .rule-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 22px;
        }

        .rule-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(30, 60, 120, 0.15);
            transition: background 0.35s, box-shadow 0.35s, transform 0.35s;
        }

        .rule-dot.on {
            background: #2563eb;
            box-shadow: 0 0 8px rgba(37, 99, 235, 0.4);
            transform: scale(1.35);
        }

        /* thin progress bar */
        .rule-bar-track {
            width: 100%;
            height: 2px;
            background: rgba(30, 60, 120, 0.1);
            border-radius: 2px;
            margin-top: 14px;
            overflow: hidden;
        }

        .rule-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #6d3aed);
            border-radius: 2px;
            width: 0;
        }

        .rule-bar-fill.running {
            animation: barFill 5s linear forwards;
        }

        @keyframes barFill {
            from { width: 0; }
            to   { width: 100%; }
        }

        /* ── Responsive ─────────────────────────── */
        @media (max-width: 960px) {
            .rules-panel { display: none; }
            .logo-area {
                left: 50%;
                text-align: center;
                transform: translate(-50%, -50%);
                transform-origin: center center;
            }
            @keyframes logoFloat {
                0%, 100% { transform: translate(-50%, -50%); }
                50%      { transform: translate(-50%, calc(-50% - 10px)); }
            }
        }

        @media (max-width: 480px) {
            .logo-text { letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="rays"></div>

        <!-- Sun -->
        <div class="sun">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer glow -->
                <circle cx="50" cy="50" r="48" fill="rgba(200, 230, 255, 0.25)"/>
                <!-- Main body -->
                <circle cx="50" cy="50" r="36" fill="#d0e6ff"/>
                <circle cx="50" cy="50" r="36" fill="url(#sunGrad)" />
                <!-- Inner highlight -->
                <ellipse cx="44" cy="40" rx="18" ry="14" fill="rgba(255, 255, 255, 0.45)"/>
                <!-- Face -->
                <circle cx="40" cy="48" r="3" fill="rgba(30, 60, 140, 0.7)"/>
                <circle cx="60" cy="48" r="3" fill="rgba(30, 60, 140, 0.7)"/>
                <circle cx="39" cy="46" r="1.2" fill="rgba(255,255,255,0.85)"/>
                <circle cx="59" cy="46" r="1.2" fill="rgba(255,255,255,0.85)"/>
                <!-- Smile -->
                <path d="M42,57 Q50,65 58,57" fill="none" stroke="rgba(30, 60, 140, 0.55)" stroke-width="2" stroke-linecap="round"/>
                <!-- Cheeks -->
                <ellipse cx="35" cy="56" rx="5" ry="3" fill="rgba(140, 190, 255, 0.4)"/>
                <ellipse cx="65" cy="56" rx="5" ry="3" fill="rgba(140, 190, 255, 0.4)"/>
                <defs>
                    <radialGradient id="sunGrad" cx="40%" cy="38%" r="55%">
                        <stop offset="0%" stop-color="rgba(235, 245, 255, 0.9)"/>
                        <stop offset="100%" stop-color="rgba(170, 215, 255, 0.7)"/>
                    </radialGradient>
                </defs>
            </svg>
        </div>

        <!-- Ambient glow -->
        <div class="glow-spot" style="width:420px;height:420px;background:rgba(30,100,220,0.28);top:15%;left:12%"></div>
        <div class="glow-spot" style="width:320px;height:320px;background:rgba(60,145,255,0.18);bottom:8%;right:18%;animation-delay:2.5s"></div>
        <div class="glow-spot" style="width:260px;height:260px;background:rgba(100,185,255,0.12);top:55%;left:48%;animation-delay:4.5s"></div>

        <!-- Clouds -->
        <div id="clouds" aria-hidden="true"></div>

        <!-- Hills -->
        <div class="hills">
            <!-- Back layer -->
            <div class="hill-layer hill-back">
                <svg viewBox="0 0 1920 450" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,450 L0,280 L80,240 L180,60 L220,40 L270,90 L340,200 L420,270 L490,110 L520,80 L555,130 L610,155 L680,210 L740,300 L830,285 L920,250 L960,180 L1040,195 L1100,140 L1150,40 L1195,90 L1230,65 L1280,135 L1340,250 L1410,275 L1500,310 L1580,320 L1660,300 L1720,160 L1750,120 L1790,145 L1830,175 L1920,300 L1920,450 Z" fill="#1a4a8a"/>
                </svg>
            </div>
            <!-- Mid layer -->
            <div class="hill-layer hill-mid">
                <svg viewBox="0 0 1920 380" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,380 L0,220 L60,190 L120,170 L200,200 L290,110 L340,50 L380,30 L420,70 L480,150 L560,210 L680,250 L780,265 L860,245 L940,100 L1000,50 L1045,80 L1100,140 L1180,210 L1260,235 L1350,195 L1430,150 L1530,70 L1580,45 L1600,30 L1635,65 L1700,180 L1780,250 L1850,255 L1920,275 L1920,380 Z" fill="#0f3468"/>
                </svg>
            </div>
            <!-- Front layer -->
            <div class="hill-layer hill-front">
                <svg viewBox="0 0 1920 280" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,280 L0,170 L50,150 L120,160 L200,130 L300,180 L400,100 L470,30 L510,15 L550,50 L610,110 L700,170 L800,195 L900,190 L1020,155 L1120,90 L1250,35 L1300,20 L1330,50 L1380,105 L1470,165 L1560,195 L1640,180 L1720,160 L1790,175 L1860,195 L1920,210 L1920,280 Z" fill="#06193c"/>
                </svg>
            </div>
        </div>

        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-text">foroz</div>
            <div class="logo-sub">xat.com/foroz</div>
        </div>

        <!-- Rules -->
        <div class="rules-panel">
            <div class="rules-card">
                <div class="rules-header">Reglas</div>
                <div class="rule-viewport">
                    <div class="rule-content in" id="ruleContent">
                        <div class="rule-num" id="ruleNum">01</div>
                        <div class="rule-txt" id="ruleTxt"></div>
                    </div>
                </div>
                <div class="rule-dots" id="ruleDots"></div>
                <div class="rule-bar-track">
                    <div class="rule-bar-fill" id="ruleBar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ── Rules carousel ─────────────────────── */
        const rules = [
            "Respeta a todos los usuarios 🤝",
            "No spam ni flood en el chat 🚫",
            "Contenido apropiado siempre ✨",
            "Usa el idioma del chat 💬",
            "No pidas rango, se gana 🌟",
            "Diviértete y sé amable 😊",
        ];

        const INTERVAL = 5000;
        const FADE_MS  = 380;

        const elContent = document.getElementById("ruleContent");
        const elNum     = document.getElementById("ruleNum");
        const elTxt     = document.getElementById("ruleTxt");
        const elDots    = document.getElementById("ruleDots");
        const elBar     = document.getElementById("ruleBar");

        let cur = 0;

        // Build dots
        rules.forEach(function (_, i) {
            var d = document.createElement("span");
            d.className = "rule-dot" + (i === 0 ? " on" : "");
            elDots.appendChild(d);
        });

        function setRule(index) {
            elNum.textContent = String(index + 1).padStart(2, "0");
            elTxt.textContent = rules[index];
            var dots = elDots.children;
            for (var i = 0; i < dots.length; i++) {
                dots[i].classList.toggle("on", i === index);
            }
        }

        function restartBar() {
            elBar.classList.remove("running");
            void elBar.offsetWidth;          // reflow
            elBar.classList.add("running");
        }

        function nextRule() {
            // fade out
            elContent.classList.remove("in");
            elContent.classList.add("out");

            setTimeout(function () {
                cur = (cur + 1) % rules.length;
                setRule(cur);

                // fade in
                elContent.classList.remove("out");
                elContent.classList.add("in");

                restartBar();
            }, FADE_MS);
        }

        // Init
        setRule(0);
        restartBar();
        setInterval(nextRule, INTERVAL);

        /* ── Clouds ──────────────────────────────── */
        var cloudsEl = document.getElementById("clouds");

        var cloudSVG = '<svg viewBox="0 0 170 115" xmlns="http://www.w3.org/2000/svg">'
            // bottom shade
            + '<ellipse class="cloud-shade" cx="85" cy="88" rx="78" ry="25"/>'
            // main body puffs
            + '<ellipse class="cloud-base" cx="85" cy="82" rx="78" ry="26"/>'
            + '<circle  class="cloud-base" cx="50" cy="60" r="32"/>'
            + '<circle  class="cloud-base" cx="90" cy="48" r="38"/>'
            + '<circle  class="cloud-base" cx="128" cy="60" r="28"/>'
            + '<circle  class="cloud-base" cx="38" cy="68" r="24"/>'
            // top highlight
            + '<ellipse class="cloud-highlight" cx="85" cy="50" rx="34" ry="14"/>'
            // outline
            + '<path class="cloud-outline" d="M8,82 Q8,68 38,62 Q28,40 55,38 Q52,18 90,20 Q120,18 130,40 Q155,42 160,62 Q170,72 162,82"/>'
            // left eye
            + '<ellipse class="cloud-eye" cx="68" cy="72" rx="5" ry="6.5"/>'
            + '<circle class="cloud-eye-shine" cx="66" cy="69" r="2"/>'
            // right eye
            + '<ellipse class="cloud-eye" cx="105" cy="72" rx="5" ry="6.5"/>'
            + '<circle class="cloud-eye-shine" cx="103" cy="69" r="2"/>'
            + '</svg>';

        var sizes = ["sm", "md", "lg"];
        var cloudSlots = [
            { top: "5%",  delay: 0,  dur: 55 },
            { top: "18%", delay: 12, dur: 70 },
            { top: "32%", delay: 28, dur: 50 },
            { top: "48%", delay: 6,  dur: 65 },
            { top: "60%", delay: 20, dur: 58 },
            { top: "10%", delay: 35, dur: 75 },
        ];

        cloudSlots.forEach(function (slot, i) {
            var c = document.createElement("div");
            var sz = sizes[i % sizes.length];
            c.className = "cloud " + sz;
            c.innerHTML = '<div class="cloud-body">' + cloudSVG + '</div>';
            c.style.top = slot.top;
            c.style.left = "-200px";
            c.style.opacity = 0.7 + Math.random() * 0.3;
            c.style.animationDuration = slot.dur + "s";
            c.style.animationDelay = slot.delay + "s";
            cloudsEl.appendChild(c);
        });
    </script>
</body>
</html>
